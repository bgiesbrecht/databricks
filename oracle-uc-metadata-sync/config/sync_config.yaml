# Oracle -> Unity Catalog metadata sync configuration.
#
# DEFAULT MODE IS METADATA-ONLY: the tool applies comments/tags to UC objects that ALREADY EXIST
# (built by Lakeflow Connect, by hand, etc.) and creates nothing. It auto-detects each object's real type
# (table / MV / view), so you don't declare it. To instead have the tool CREATE objects from the federated
# source, add `metadata_only: false` and a `target.type` (VIEW | MATERIALIZED_VIEW | TABLE) — see GETTING_STARTED.md §6.
#
# Mapping: each sync maps its Oracle `source.schema` -> `target.catalog`.`target.schema`; objects land at
# <lower(name)> there. Add `objects.overrides` to send specific objects elsewhere. `00_setup` loads this;
# re-run it after any edit (the engine reads the loaded config table, not this file).
#
# source.*   = the DATA: the real Oracle app schema, federated directly (connection user has SELECT).
# metadata.* = where the owner-filtered v_metadata helper view lives (the read-only connection user's schema).
# Annotations are ALWAYS captured into the registry; applied as UC tags only when apply_to_objects=true.

syncs:
  - name: sales                       # SALES.* (existing UC objects) in bg.sales
    source:   {connection: bg-oracle-ro, catalog: bg-oracle-ro_catalog, schema: sales}
    metadata: {catalog: bg-oracle-ro_catalog, schema: dbx_fed}
    target:   {catalog: bg, schema: sales}     # no `type` needed in metadata-only mode (auto-detected)
    comments: true
    annotations: {enabled: true, apply_to_objects: true}
    objects:
      default: all
      # Optional per-object override — point one object at a different catalog/schema/name:
      # overrides:
      #   - {oracle_object: CUSTOMERS, target_catalog: bg, target_schema: sales, target_object: customers}
    # Optional Genie integration (README §10). Blank genie_space_id disables the hook.
    hooks: {on_change_notebook: "hooks/genie_push", genie_space_id: ""}

# Promotion policy: default route is REGISTRY (registry-only). Only names listed here become UC tags.
annotation_promotion:
  - {name: PII,            route: TAG, scope: COLUMN}
  - {name: Sensitivity,    route: TAG, scope: COLUMN}
  - {name: Classification, route: TAG, scope: BOTH}
  - {name: Data_Domain,    route: TAG, scope: TABLE}
  - {name: Owner_Team,     route: TAG, scope: TABLE}
  - {name: Geo,            route: TAG, scope: COLUMN}

# Genie integration (optional): no mapping table to author. The genie_push hook derives the Genie section
# from each annotation's name prefix + the JSON value's Type — foreign_key -> join, sql_expression_* -> filter
# or expression, sample_query_* -> example. Enable it per-sync via the `hooks.genie_space_id` field above.
# Full spec + examples: see ANNOTATION_PARSING.md.
